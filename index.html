<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KYPフットサルアリーナ | コート予約</title>
    <style>
      :root {
        --bg: #0c1220;
        --panel: #141c2f;
        --accent: #22c55e;
        --accent-dim: #16a34a;
        --text: #e8edf7;
        --muted: #94a3b8;
        --border: rgba(148, 163, 184, 0.2);
        --max: 1100px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }
      a { color: var(--accent); }
      header {
        border-bottom: 1px solid var(--border);
        background: rgba(12, 18, 32, 0.92);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .header-inner {
        max-width: var(--max);
        margin: 0 auto;
        padding: 0.85rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .brand { font-weight: 700; letter-spacing: 0.04em; font-size: 1.05rem; }
      .brand span { color: var(--accent); }
      nav { display: flex; gap: 1.25rem; font-size: 0.9rem; }
      nav a { color: var(--muted); text-decoration: none; }
      nav a:hover { color: var(--text); }
      main { max-width: var(--max); margin: 0 auto; padding: 2rem 1.25rem 4rem; }
      .hero { display: grid; gap: 1.25rem; margin-bottom: 2.5rem; }
      @media (min-width: 768px) { .hero { grid-template-columns: 1.1fr 0.9fr; align-items: center; } }
      .hero h1 { margin: 0 0 0.75rem; font-size: clamp(1.75rem, 4vw, 2.35rem); line-height: 1.25; }
      .hero p { margin: 0; color: var(--muted); max-width: 36rem; }
      .pill {
        display: inline-block;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
        border: 1px solid rgba(34, 197, 94, 0.35);
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        margin-bottom: 0.75rem;
      }
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
      .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
      .stat strong { display: block; font-size: 1.35rem; color: var(--accent); }
      .stat span { font-size: 0.8rem; color: var(--muted); }
      .section-title { font-size: 1.25rem; margin: 0 0 0.5rem; }
      .section-lead { color: var(--muted); margin: 0 0 1.25rem; font-size: 0.95rem; }
      .embed-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.35); }
      .embed-head { padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 0.5rem; font-size: 0.9rem; }
      .embed-head code { font-size: 0.78rem; color: var(--muted); background: rgba(0,0,0,0.25); padding: 0.2rem 0.45rem; border-radius: 6px; word-break: break-all; }
      iframe { display: block; width: 100%; min-height: min(85vh, 920px); border: 0; background: #fff; }
      .note { margin-top: 1.25rem; padding: 1rem 1.1rem; border-radius: 12px; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); font-size: 0.88rem; color: var(--muted); }
      .note strong { color: var(--text); }
      footer { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.85rem; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="brand">KYP <span>FUTSAL</span></div>
        <nav>
          <a href="#info">施設概要</a>
          <a href="#reserve">予約</a>
        </nav>
      </div>
    </header>
    <main>
      <section class="hero" id="info">
        <div>
          <div class="pill">Indoor futsal · Rental court</div>
          <h1>人工芝コートをオンラインで予約</h1>
          <p>少人数からチーム練習まで。照明・シャワー完備。RESERVAの埋め込みウィジェットで、このサイトからそのまま空き枠の確認と予約ができます。</p>
        </div>
        <div class="stats" aria-label="施設の目安">
          <div class="stat"><strong>3</strong><span>コート</span></div>
          <div class="stat"><strong>5v5</strong><span>推奨人数</span></div>
          <div class="stat"><strong>6:00</strong><span>〜23:00</span></div>
        </div>
      </section>
      <section id="reserve">
        <h2 class="section-title">コート予約</h2>
        <p class="section-lead">下のフレーム内がRESERVAの表示エリアです。</p>
        <div class="embed-wrap">
          <div class="embed-head">
            <span id="embed-label">読み込み先</span>
            <code id="embed-src-display"></code>
          </div>
          <a href="https://reserva.be/kyproduce/reserve" target="_blank">
            <img src="https://reserva.be/reserva/images/btn_reserve_2.png" alt="RESERVA予約システムから予約する" width="120" />
          </a>
          <div><div style="width: 1060px; max-width: 100%">
            <iframe style="width: 100% !important; height: 1060px" frameborder="0" src="https://reserva.be/kyproduce/reserve?simple=2"></iframe>
          </div></div>
        </div>
        <div class="note">
          <strong>差し替え方法:</strong> RESERVA_EMBED_URL を管理画面のURLに変更するか、iframe src を直接書き換えてください。
        </div>
      </section>
      <footer>© サンプル — KYPフットサルアリーナ（架空の施設名）</footer>
    </main>
    <script>
      const RESERVA_EMBED_URL = null;
      (function () {
        var label = document.getElementById("embed-label");
        var display = document.getElementById("embed-src-display");
        var iframe = document.querySelector("iframe");
        var url = RESERVA_EMBED_URL && String(RESERVA_EMBED_URL).trim();
        if (url && iframe) {
          iframe.src = url;
          label.textContent = "RESERVA（本番URL）";
        } else {
          label.textContent = "仮: 同梱モック（embed-mock.html）";
        }
        if (display && iframe) display.textContent = iframe.getAttribute("src") || "";
      })();
    </script>
  </body>
</html>
